services:
  travel-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: sse
      HOST: 0.0.0.0
      PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
